<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3ΛΛ</title>
    <link rel="icon" type="image/png" href="/Portfolio/public/art/favicon.png" />
    <link rel="apple-touch-icon" href="/Portfolio/public/art/favicon.png" />
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #eae6df;
      }

      #boot-loader img {
        width: min(58vw, 420px);
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-hidden="true">
      <img src="/Portfolio/art/logo.png" alt="" />
    </div>
    <div id="root"></div>
    <script type="module">
      const localHosts = new Set(["localhost", "127.0.0.1", ""]);

      if (localHosts.has(window.location.hostname)) {
        import("/src/main.tsx");
      } else {
        const styles = document.createElement("link");
        styles.rel = "stylesheet";
        styles.href = "/Portfolio/assets/index.css";
        document.head.append(styles);

        import("/Portfolio/assets/index.js");
      }
    </script>
  </body>
</html>
